name: Build Arc Linux Images
on:
  workflow_dispatch:
    inputs:
      arch:
        description: '选择目标架构'
        required: true
        type: choice
        options:
          - x86_64
          - aarch64
        default: 'x86_64'

jobs:
  build:
    name: build-${{ github.event.inputs.arch }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libssl-dev \
            bc cpio gzip parted dosfstools mtools grub-efi-amd64-bin \
            grub-pc-bin xorriso meson ninja-build pkg-config \
            libarchive-dev libcurl4-openssl-dev libgpgme-dev wget xz-utils \
            syslinux-utils isolinux curl

      - name: 安装ARM64交叉编译器
        if: github.event.inputs.arch == 'aarch64'
        run: sudo apt-get install -y crossbuild-essential-arm64

      - name: 下载所有源码包
        run: bash scripts/download-sources.sh

      - name: 编译内核
        run: |
          cd kernel
          if [ "${{ github.event.inputs.arch }}" = "x86_64" ]; then
            make KCONFIG_ALLCONFIG=required-config.x86_64 x86_64_defconfig
          else
            export CROSS_COMPILE=aarch64-linux-gnu-
            export ARCH=arm64
            make KCONFIG_ALLCONFIG=required-config.aarch64 defconfig
          fi
          make -j$(nproc)
          cd ..

      - name: 构建根文件系统
        run: bash scripts/build-rootfs.sh ${{ github.event.inputs.arch }}

      - name: 编译 init
        run: |
          make -C init clean
          make -C init
          make -C init install DESTDIR="$PWD/rootfs-build/${{ github.event.inputs.arch }}"

      - name: 编译用户空间组件
        run: |
          bash packages/build-order.sh \
            ${{ github.event.inputs.arch }} \
            "$PWD/rootfs-build/${{ github.event.inputs.arch }}"

      - name: 打包 x86_64 ISO
        if: github.event.inputs.arch == 'x86_64'
        run: bash scripts/make-iso.sh

      - name: 打包 aarch64 镜像
        if: github.event.inputs.arch == 'aarch64'
        run: bash scripts/make-image.sh

      - name: 上传 x86_64 分卷文件
        if: github.event.inputs.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: arc-linux-x86_64-parts
          path: arc-linux-x86_64.iso.part_*

      - name: 上传 aarch64 分卷文件
        if: github.event.inputs.arch == 'aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: arc-linux-aarch64-parts
          path: arc-linux-aarch64.img.part_*
