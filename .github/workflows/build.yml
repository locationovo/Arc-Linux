name: Build Arc Linux Images

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '选择目标架构'
        required: true
        type: choice
        options:
          - x86_64
          - aarch64
        default: 'x86_64'

jobs:
  build:
    name: build-${{ github.event.inputs.arch }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex libssl-dev libelf-dev \
            bc cpio gzip parted dosfstools mtools \
            grub-efi-amd64-bin grub-pc-bin xorriso \
            meson ninja-build pkg-config \
            libarchive-dev libcurl4-openssl-dev libgpgme-dev \
            wget xz-utils curl zstd rsync \
            libncurses-dev libtinfo-dev dwarves \
            syslinux-utils isolinux

      - name: 安装ARM64交叉编译依赖
        if: github.event.inputs.arch == 'aarch64'
        run: |
          sudo apt-get install -y crossbuild-essential-arm64
          sudo dpkg --add-architecture arm64
          # 只修改Ubuntu官方源文件，避免破坏第三方源
          sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list.d/ubuntu.sources
          fi

          # 添加ports.ubuntu.com 作为arm64源
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list

          sudo apt-get update
          sudo apt-get install -y libncurses-dev:arm64 libtinfo-dev:arm64
      - name: 下载所有源码包
        run: bash scripts/download-sources.sh

      - name: 编译内核
        run: |
          cd kernel
          if [ "${{ github.event.inputs.arch }}" = "x86_64" ]; then
            make KCONFIG_ALLCONFIG=required-config.x86_64 x86_64_defconfig
          else
            export CROSS_COMPILE=aarch64-linux-gnu-
            export ARCH=arm64
            make KCONFIG_ALLCONFIG=required-config.aarch64 defconfig
          fi
          make -j$(nproc)
          cd ..

      - name: 构建根文件系统
        run: bash scripts/build-rootfs.sh ${{ github.event.inputs.arch }}

      - name: 编译init（静态链接）
        run: |
          ROOTFS="$PWD/rootfs-build/${{ github.event.inputs.arch }}"
          mkdir -p "$ROOTFS"

          if [ "${{ github.event.inputs.arch }}" = "aarch64" ]; then
            export CROSS_COMPILE=aarch64-linux-gnu-
            export ARCH=arm64
            export CC=aarch64-linux-gnu-gcc
          fi

          make -C init clean
          make -C init
          sudo make -C init install DESTDIR="$ROOTFS"

      - name: 编译用户空间组件
        run: |
          sudo bash packages/build-order.sh \
            ${{ github.event.inputs.arch }} \
            "$PWD/rootfs-build/${{ github.event.inputs.arch }}"

      - name: 打包initramfs
        run: |
          ROOTFS="$PWD/rootfs-build/${{ github.event.inputs.arch }}"
          cd "$ROOTFS"
          mkdir -p dev proc sys tmp run etc
          find . -mindepth 1 -print0 | cpio --null -ov --format=newc | gzip -9 > ../initramfs.img

      - name: 打包x86_64 ISO
        if: github.event.inputs.arch == 'x86_64'
        run: |
          sudo mkdir -p iso-root/boot
          sudo cp rootfs-build/initramfs.img iso-root/boot/initramfs.img
          sudo bash scripts/build-image.sh x86_64

      - name: 打包aarch64镜像
        if: github.event.inputs.arch == 'aarch64'
        run: |
          sudo bash scripts/build-image.sh aarch64

      - name: 上传x86_64分卷文件
        if: github.event.inputs.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: arc-linux-x86_64-parts
          path: arc-linux-x86_64.iso.part_*

      - name: 上传aarch64分卷文件
        if: github.event.inputs.arch == 'aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: arc-linux-aarch64-parts
          path: arc-linux-aarch64.img.part_*
